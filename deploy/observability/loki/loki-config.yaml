# Loki (Phase 6A) — single-binary / monolithic mode, filesystem backend. Dev-only sizing.
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  # Allow structured metadata + enable the volume endpoint (used by Grafana's log volume panel).
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 24h    # dev retention

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
