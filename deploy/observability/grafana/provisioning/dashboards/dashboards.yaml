# Grafana dashboard provider (Phase 6A) — loads any dashboard JSON dropped into /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: dolos
    orgId: 1
    folder: Dolos
    type: file
    disableDeletion: false
    editable: true
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
