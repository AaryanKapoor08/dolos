# Dolos — application services (Phase 0C+).
#
# Brought up alongside the infra baseline; joins the same external `dolos` network so
# services reach Postgres by its DNS name. Must be run together with infra.yml:
#   docker compose -f infra.yml -f services.yml up -d
# (No top-level `name:` here on purpose, so a combined run shares infra.yml's project.)

services:
  # --- Spring Cloud edge (Phase 5A) -----------------------------------------------------
  # discovery-server: Netflix Eureka service registry. Every service registers here as a Eureka
  # client so the API gateway (5B) can route by logical name (lb://service). Dashboard: :8761.
  discovery-server:
    build:
      context: ../..
      dockerfile: services/discovery-server/Dockerfile
    image: dolos/discovery-server:0.0.1-SNAPSHOT
    container_name: dolos-discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dolos

  # config-server: Spring Cloud Config server serving deploy/config-repo (the `native` filesystem
  # backend, bind-mounted read-only so edits + POST /actuator/refresh apply without an image rebuild).
  # Registers with Eureka like any other service. Clients import it with optional:configserver (so a
  # service still boots from its local application.yml if this server is down).
  config-server:
    build:
      context: ../..
      dockerfile: services/config-server/Dockerfile
    image: dolos/config-server:0.0.1-SNAPSHOT
    container_name: dolos-config-server
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
    ports:
      - "8888:8888"
    environment:
      # The bind-mounted config-repo path inside the container (native backend search location).
      DOLOS_CONFIG_REPO: /config-repo
      # Register with the registry by its compose DNS name on the shared network.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    volumes:
      - ../config-repo:/config-repo:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8888/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # api-gateway: the platform's single secured entry point (Phase 5B). A reactive Spring Cloud Gateway
  # that routes /api/** to the business services by Eureka name (lb://), validates the edge JWT against
  # Keycloak, relays the token downstream, and trips a Resilience4j circuit breaker to a local 503
  # fallback when a route's service is unhealthy. This is the only service that needs a published port
  # for browser/API clients once the console (5E) lands.
  api-gateway:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    image: dolos/api-gateway:0.0.1-SNAPSHOT
    container_name: dolos-api-gateway
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      # Validate the edge bearer JWT against the dolos realm's signing keys, reached by compose DNS.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
      # Spring Cloud edge (5A): register with Eureka (enables lb:// routing) + pull centralized config.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  transaction-service:
    build:
      context: ../..
      dockerfile: services/transaction-service/Dockerfile
    image: dolos/transaction-service:0.0.1-SNAPSHOT
    container_name: dolos-transaction-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      # Reach Postgres by its compose DNS name on the shared `dolos` network.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # Consume TransactionReceived over the broker's internal listener (Phase 1C).
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm, reached by compose DNS.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Reactive edge (Phase 1B): persists raw inbound transactions via R2DBC and publishes
  # TransactionReceived to Redpanda. Needs both Postgres and the broker healthy.
  ingestion-service:
    build:
      context: ../..
      dockerfile: services/ingestion-service/Dockerfile
    image: dolos/ingestion-service:0.0.1-SNAPSHOT
    container_name: dolos-ingestion-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      # Reactive data path (R2DBC) + a JDBC URL used only by Flyway for migrations.
      # `?schema=ingestion` keeps this service's tables in its own schema (see application.yml).
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}?schema=ingestion
      SPRING_R2DBC_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_R2DBC_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_FLYWAY_USER: ${POSTGRES_USER:-dolos}
      SPRING_FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # Reach Redpanda by its internal listener on the shared `dolos` network.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Reactive resource-server security (5B): validate JWTs against the dolos realm; /ingest stays open.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Risk scoring (Phase 1D): consumes TransactionReceived, applies a simple in-code rule, and
  # publishes RiskScored. Stateless v0 — needs only the broker (no database).
  scoring-service:
    build:
      context: ../..
      dockerfile: services/scoring-service/Dockerfile
    image: dolos/scoring-service:0.0.1-SNAPSHOT
    container_name: dolos-scoring-service
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8083:8083"
      - "9090:9090"   # gRPC ScoringService (Phase 2C)
    environment:
      # Consume/produce over the broker's internal listener on the shared `dolos` network.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm, reached by compose DNS.
      # (HTTP/Actuator only; the gRPC ScoringService on :9090 is unaffected.)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Fraud graph (Phase 2D): consumes TransactionReceived, MERGEs the account/customer/device graph
  # into Neo4j, serves GET /api/graph/account/{id}/neighborhood, and (Phase 2E) detects mule rings,
  # publishing RingDetected. Needs Neo4j + the broker.
  graph-service:
    build:
      context: ../..
      dockerfile: services/graph-service/Dockerfile
    image: dolos/graph-service:0.0.1-SNAPSHOT
    container_name: dolos-graph-service
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8085:8085"
    environment:
      # Reach Neo4j by its compose DNS name on the shared `dolos` network.
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-dolosgraph}
      # Consume TransactionReceived / produce RingDetected over the broker's internal listener.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm, reached by compose DNS.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Alerting (Phase 1E): consumes RiskScored, persists an Alert (own `alert` schema) when a score
  # crosses the threshold, publishes AlertRaised, and serves GET /api/alerts. Needs Postgres + broker.
  alert-service:
    build:
      context: ../..
      dockerfile: services/alert-service/Dockerfile
    image: dolos/alert-service:0.0.1-SNAPSHOT
    container_name: dolos-alert-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      # Reach Postgres by its compose DNS name; Flyway reuses this datasource (own `alert` schema).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # Consume RiskScored / produce AlertRaised over the broker's internal listener.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Synchronous score-detail enrichment over gRPC (Phase 2C); Resilience4j covers an outage.
      DOLOS_SCORING_GRPC_TARGET: scoring-service:9090
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      # alert-service is the config-refresh demo target (see deploy/config-repo/alert-service.yml).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm, reached by compose DNS.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Case management (Phase 3): the Spring Modulith case-service. Hosts the Axon event-sourced Case
  # aggregate + CQRS read model + embedded Flowable BPMN engine on its own `casework` schema. From 3E
  # it also consumes AlertRaised (-> OpenCase) and publishes case events via the Modulith outbox, so it
  # now needs the broker too.
  case-service:
    build:
      context: ../..
      dockerfile: services/case-service/Dockerfile
    image: dolos/case-service:0.0.1-SNAPSHOT
    container_name: dolos-case-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      keycloak:
        condition: service_started
      config-server:
        condition: service_healthy
    ports:
      - "8086:8086"
    environment:
      # Reach Postgres by its compose DNS name; Flyway reuses this datasource (own `casework` schema).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # Consume AlertRaised / publish case events over the broker's internal listener (Phase 3E).
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Validate Keycloak JWTs against the dolos realm's keys, reached by compose DNS (Phase 3F).
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Live notifications (Phase 5C): consumes AlertRaised + the case lifecycle events off Redpanda and
  # fans them out to the browser over WebSocket/STOMP (/topic/alerts, /topic/cases). Stateless — no DB.
  # The gateway routes ws:// traffic here (lb:ws://notification-service) and leaves the handshake open.
  notification-service:
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    image: dolos/notification-service:0.0.1-SNAPSHOT
    container_name: dolos-notification-service
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
      config-server:
        condition: service_healthy
    ports:
      - "8091:8091"
    environment:
      # Consume the outcome events over the broker's internal listener on the shared `dolos` network.
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5C): validate JWTs against the dolos realm; /ws handshake stays open.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8091/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # GraphQL BFF (Phase 5D): one aggregating GraphQL endpoint for the console. Reactive (WebFlux) — calls
  # the business services over load-balanced WebClient and relays the caller's token. Stateless — no DB.
  bff-service:
    build:
      context: ../..
      dockerfile: services/bff-service/Dockerfile
    image: dolos/bff-service:0.0.1-SNAPSHOT
    container_name: dolos-bff-service
    restart: unless-stopped
    depends_on:
      discovery-server:
        condition: service_started
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8092:8092"
    environment:
      # Spring Cloud edge (5A): register with Eureka (enables lb:// WebClient) + pull centralized config.
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Reactive resource-server security (5D): validate JWTs against the dolos realm; GraphiQL stays open.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8092/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # AI copilot (Phase 4): Spring AI over a local Ollama model. 4A serves POST /api/copilot/chat;
  # later steps add RAG (pgvector), tool-calling, an investigate-alert agent and an MCP server.
  # Gated on `ollama-init` finishing so the chat/embedding models are present before it serves.
  ai-copilot-service:
    build:
      context: ../..
      dockerfile: services/ai-copilot-service/Dockerfile
    image: dolos/ai-copilot-service:0.0.1-SNAPSHOT
    container_name: dolos-ai-copilot-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      # Gate on the corpus being uploaded (also MinIO's readiness gate); startup ingest reads it.
      minio-init:
        condition: service_completed_successfully
      config-server:
        condition: service_healthy
    ports:
      - "8090:8090"
    environment:
      # Reach the Ollama model server by its compose DNS name on the shared `dolos` network.
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      # Postgres (pgvector) holds the RAG vector store; Flyway owns the `copilot` schema's V1 table.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # The RAG source corpus bucket on MinIO, reached by compose DNS.
      DOLOS_RAG_MINIO_ENDPOINT: http://minio:9000
      DOLOS_RAG_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-dolos}
      DOLOS_RAG_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dolosminio}
      # The investigate-alert agent (Phase 4E) writes drafted SARs to this MinIO bucket (created on
      # startup if absent); kept separate from the read-only `regulations` corpus.
      DOLOS_INVESTIGATION_SAR_BUCKET: sar-drafts
      # Platform tools (Phase 4D): reach the downstream services by compose DNS. case-service is secured,
      # so the copilot obtains a service token via the dolos-copilot client-credentials grant on Keycloak.
      DOLOS_PLATFORM_TRANSACTION_BASE_URL: http://transaction-service:8081
      DOLOS_PLATFORM_ALERT_BASE_URL: http://alert-service:8084
      DOLOS_PLATFORM_GRAPH_BASE_URL: http://graph-service:8085
      DOLOS_PLATFORM_CASE_BASE_URL: http://case-service:8086
      DOLOS_PLATFORM_KEYCLOAK_TOKEN_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/token
      DOLOS_PLATFORM_KEYCLOAK_CLIENT_ID: dolos-copilot
      DOLOS_PLATFORM_KEYCLOAK_CLIENT_SECRET: dolos-copilot-secret
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm; MCP SSE stays open.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Regulatory reporting (Phase 6B): a Spring Batch service whose nightly job reads HIGH-severity alerts
  # from the alert read model, builds a SAR/STR for each, and files it to MinIO + its own `reporting`
  # schema (which also holds the Spring Batch metadata tables). The FORMAL filing vs. the copilot DRAFT.
  reporting-service:
    build:
      context: ../..
      dockerfile: services/reporting-service/Dockerfile
    image: dolos/reporting-service:0.0.1-SNAPSHOT
    container_name: dolos-reporting-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      config-server:
        condition: service_healthy
    ports:
      - "8093:8093"
    environment:
      # Reach Postgres by its compose DNS name; Flyway owns the `reporting` schema (Batch meta + reports).
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dolos}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dolos}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      # The filed-reports object store on MinIO, reached by compose DNS.
      DOLOS_REPORTING_MINIO_ENDPOINT: http://minio:9000
      DOLOS_REPORTING_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-dolos}
      DOLOS_REPORTING_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-dolosminio}
      # Spring Cloud edge (5A): register with Eureka + pull centralized config (optional fallback).
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      # Resource-server security (5B): validate JWTs against the dolos realm, reached by compose DNS.
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/dolos/protocol/openid-connect/certs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8093/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - dolos

  # Bulk CSV feed (Phase 1G): Apache NiFi watches a host folder and turns each dropped CSV
  # into a bulk NDJSON POST to ingestion-service. Runs UNSECURED over HTTP so the bootstrap
  # can drive the REST API anonymously — local $0 dev only, never production.
  nifi:
    image: apache/nifi:1.28.1
    container_name: dolos-nifi
    restart: unless-stopped
    depends_on:
      ingestion-service:
        condition: service_healthy
    ports:
      - "8089:8080"   # NiFi UI — http://localhost:8089/nifi
    environment:
      NIFI_WEB_HTTP_HOST: "0.0.0.0"
      NIFI_WEB_HTTP_PORT: "8080"
    volumes:
      # The watched drop folder (host bind): drop sample-transactions.csv here to feed the slice.
      - ../nifi/incoming:/opt/dolos/incoming
    networks:
      - dolos

  # One-shot: waits for NiFi, then builds the GetFile -> ConvertRecord -> InvokeHTTP dataflow
  # via NiFi's REST API. Re-runs cleanly because NiFi starts with an empty flow (no flow volume
  # is mounted), so every `up` lands the same freshly-built feed.
  nifi-flow-init:
    image: alpine:3.20
    container_name: dolos-nifi-flow-init
    restart: "no"
    depends_on:
      nifi:
        condition: service_started
    volumes:
      - ../nifi/bootstrap:/bootstrap:ro
    environment:
      NIFI_API: http://nifi:8080/nifi-api
      INGEST_URL: http://ingestion-service:8082/ingest/transactions
      WATCH_DIR: /opt/dolos/incoming
    command: ["sh", "-c", "apk add --no-cache curl jq >/dev/null && sh /bootstrap/build-flow.sh"]
    networks:
      - dolos

# The `dolos` network is created by infra.yml; here we attach to it as external.
networks:
  dolos:
    name: dolos
    external: true
