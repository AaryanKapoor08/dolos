# Dolos — local infrastructure baseline (Phase 0B)
#
# PostgreSQL on the pgvector image so the `vector` extension is available from day one
# (no DB swap when the Phase 4 AI copilot needs embeddings). Local-dev defaults are baked
# in below; override any of them via shell env or an (untracked) .env file in this folder.
#
# Usage:
#   docker compose -f infra.yml up -d      # start in background
#   docker compose -f infra.yml ps         # status + health
#   docker compose -f infra.yml down       # stop (keeps the named volume / data)
#   docker compose -f infra.yml down -v    # stop AND delete data
# Or use the helper: ./infra.ps1 up | status | logs | psql | down | reset

name: dolos-infra

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dolos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dolos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dolos}
      POSTGRES_DB: ${POSTGRES_DB:-dolos}
      # Fail fast on bad auth config rather than silently allowing trust auth.
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dolos-pgdata:/var/lib/postgresql/data
    healthcheck:
      # pg_isready returns 0 only once the server accepts connections.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dolos} -d ${POSTGRES_DB:-dolos}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - dolos

  # --- Event backbone (Phase 1A) --------------------------------------------------------
  # Redpanda: a single-binary, Kafka-API-compatible broker (lighter than Kafka+KRaft on a
  # laptop). Two listeners: `internal` (redpanda:9092) for other containers on the dolos
  # network, and `external` (localhost:19092) for host-run dev/tests. `dev-container` mode
  # disables production guardrails (fsync, memory checks) — fine for local $0 infra.
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: dolos-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr=redpanda:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=info
    ports:
      - "${REDPANDA_KAFKA_PORT:-19092}:19092"   # Kafka API (host)
      - "18081:18081"                           # Schema Registry (host)
      - "18082:18082"                           # HTTP proxy (host)
      - "19644:9644"                            # Admin API / metrics (host)
    volumes:
      - dolos-redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health -X brokers=localhost:9092 | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - dolos

  # Redpanda Console: web UI to browse topics, messages, and consumer groups. Used to
  # *see* TransactionReceived → RiskScored → AlertRaised flow through the pipeline.
  redpanda-console:
    image: redpandadata/console:v2.8.2
    container_name: dolos-redpanda-console
    restart: unless-stopped
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8088}:8080"
    networks:
      - dolos

  # --- Graph store (Phase 2D) -----------------------------------------------------------
  # Neo4j: the fraud graph. graph-service MERGEs (:Account)-[:TRANSACTED]->(:Account),
  # (:Customer)-[:OWNS]->(:Account) and (:Account)-[:USED]->(:Device) from TransactionReceived,
  # then runs variable-length Cypher to surface mule rings (Phase 2E). Community edition is $0;
  # auth password must be >= 8 chars. Browser at http://localhost:7474, Bolt on 7687.
  neo4j:
    image: neo4j:5.26-community
    container_name: dolos-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-dolosgraph}
      # Keep the laptop footprint small (dev defaults are higher).
      NEO4J_server_memory_pagecache_size: 256M
      NEO4J_server_memory_heap_initial__size: 256M
      NEO4J_server_memory_heap_max__size: 512M
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # Neo4j Browser (HTTP)
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt (driver)
    volumes:
      - dolos-neo4j:/data
    healthcheck:
      # cypher-shell ships in the image; a successful auth'd query means the DB accepts traffic.
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-dolosgraph} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - dolos

  # --- Identity (Phase 3F) --------------------------------------------------------------
  # Keycloak: OAuth2/OIDC identity provider. Runs in dev mode (HTTP, $0) and imports the
  # `dolos` realm at startup (roles ANALYST/SENIOR_ANALYST/ADMIN + a confidential client),
  # so it's fully reproducible. case-service validates JWTs against this realm's keys; the
  # gateway/UI use the client in Phase 5. Admin console http://localhost:8087 (admin/admin).
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: dolos-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      # Bootstrap admin (Keycloak 26 names; the legacy KEYCLOAK_ADMIN_* are kept for compatibility).
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8087}:8080"
    volumes:
      # Realm JSON mounted into the import dir; `--import-realm` loads every file here on start.
      - ../keycloak/realm:/opt/keycloak/data/import:ro
    networks:
      - dolos

# Shared network so later services (transaction-service, etc.) reach Postgres by the
# DNS name `postgres`. Named `dolos` so other compose files can attach to it as external.
networks:
  dolos:
    name: dolos
    driver: bridge

volumes:
  dolos-pgdata:
    name: dolos-pgdata
  dolos-redpanda:
    name: dolos-redpanda
  dolos-neo4j:
    name: dolos-neo4j
