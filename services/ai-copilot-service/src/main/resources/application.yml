spring:
  application:
    name: ai-copilot-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config from config-server. `optional:`
    # so the service still boots from this local application.yml if the config server is unreachable;
    # the container overrides the host to config-server:8888 (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  threads:
    virtual:
      # Java 21 virtual threads: chat requests block on the (slow) local model call.
      enabled: true
  datasource:
    # The RAG vector store lives in Postgres (pgvector). Host default; the container overrides via
    # SPRING_DATASOURCE_* (see services.yml). Flyway reuses this datasource for its migrations.
    url: jdbc:postgresql://localhost:5432/dolos
    username: dolos
    password: dolos
  flyway:
    enabled: true
    # Own schema so this service shares the `dolos` database without colliding with the others.
    schemas: copilot
    default-schema: copilot
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # Phase 5B: validate bearer JWTs against the Keycloak `dolos` realm's signing keys, so the
          # /api/copilot endpoints reject an invalid token (the MCP SSE endpoints stay open — see
          # CopilotSecurityConfig). Host default; the container overrides via
          # SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI.
          jwk-set-uri: http://localhost:8087/realms/dolos/protocol/openid-connect/certs
  ai:
    ollama:
      # Host default; the container overrides via SPRING_AI_OLLAMA_BASE_URL (see services.yml).
      base-url: http://localhost:11434
      init:
        # Models are pulled once by the compose `ollama-init` one-shot, not by the app — so Spring AI
        # must not try to pull them on boot (which would otherwise block startup on a multi-GB download).
        pull-model-strategy: never
      chat:
        options:
          # The single knob that picks the chat model; swappable per laptop RAM/VRAM (decision H) or to
          # a cloud model later. Overridable via OLLAMA_CHAT_MODEL. Default is llama3.2 (3B, ~4 GiB to
          # run, tool-calling capable for 4D); llama3.1 (8B) needs ~6.2 GiB — too big for this box's
          # Docker VM, so it's a swap on a machine with more RAM.
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
          # Low temperature: investigative answers should be steady, not creative.
          temperature: 0.2
      embedding:
        options:
          # The RAG ingestion (4B) embeds chunks with this model; nomic-embed-text = 768 dimensions,
          # which MUST match the vector(768) column in V1__vector_store.sql.
          model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
    vectorstore:
      pgvector:
        # Flyway owns the vector table (V1) — never let Spring AI auto-create it (house rule).
        initialize-schema: false
        schema-name: copilot
        table-name: vector_store
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW
    mcp:
      server:
        # MCP server (Phase 4F): exposes the platform @Tool beans over Spring MVC SSE so an external MCP
        # client can list + call them. Endpoints: GET /sse (stream), POST /mcp/message (tool calls). The
        # tool capability is advertised automatically because a ToolCallbackProvider bean is present.
        enabled: true
        name: dolos-platform-tools
        version: 1.0.0
        type: SYNC

# Dolos RAG configuration (Phase 4B): the regulation corpus lives in an S3-compatible MinIO bucket;
# ingestion reads every object, parses it with Tika, chunks + embeds it, and stores vectors in pgvector.
dolos:
  rag:
    minio:
      # Host default; the container overrides via DOLOS_RAG_MINIO_* (see services.yml).
      endpoint: http://localhost:9000
      access-key: ${MINIO_ROOT_USER:dolos}
      secret-key: ${MINIO_ROOT_PASSWORD:dolosminio}
      bucket: regulations
    # Ingest the corpus on startup only when the store is empty; POST /api/copilot/ingest forces a reload.
    ingest-on-startup: true
  # Where the platform tools (Phase 4D) reach the rest of Dolos. Host defaults; the container overrides
  # each via DOLOS_PLATFORM_* (see services.yml). case-service is secured, so the copilot fetches a
  # Keycloak service token via the dolos-copilot client-credentials grant.
  platform:
    transaction-base-url: http://localhost:8081
    alert-base-url: http://localhost:8084
    graph-base-url: http://localhost:8085
    case-base-url: http://localhost:8086
    transaction-history-limit: 25
    keycloak:
      token-uri: http://localhost:8087/realms/dolos/protocol/openid-connect/token
      client-id: dolos-copilot
      client-secret: dolos-copilot-secret
  # The investigate-alert agent (Phase 4E) writes drafted SARs to this MinIO bucket (reusing the RAG
  # MinIO endpoint/credentials above); it is created on startup if absent. Override via
  # DOLOS_INVESTIGATION_SAR_BUCKET (see services.yml).
  investigation:
    sar-bucket: sar-drafts

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        # health + info, plus refresh so a centralized config change is picked up via POST /actuator/refresh (5A).
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "4F"

# Register with the Eureka service registry (Phase 5A). Host default points at localhost; on the Docker
# network the container overrides EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to discovery-server:8761.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Advertise by IP — the default OS hostname (container id) isn't resolvable by Eureka peers.
    prefer-ip-address: true
