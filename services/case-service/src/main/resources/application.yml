spring:
  application:
    name: case-service
  threads:
    virtual:
      # Java 21 virtual threads for request handling and the (Phase 3E) blocking Kafka consumer path.
      enabled: true
  datasource:
    # Host default; the container overrides via SPRING_DATASOURCE_* (see services.yml).
    url: jdbc:postgresql://localhost:5432/dolos
    username: dolos
    password: dolos
  jpa:
    # Flyway owns the schema (the Axon event store + the CaseView read model); Hibernate neither
    # creates nor mutates it — it just maps the Axon entities and CaseView onto the existing tables.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        # Qualify every entity table (Axon's + CaseView) with this service's own schema.
        default_schema: casework
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    # Own schema so services can share the `dolos` database without colliding. "casework" rather than
    # "case" because the latter is a reserved word in both Java and SQL.
    schemas: casework
    default-schema: casework
    locations: classpath:db/migration
  kafka:
    # Host default (Redpanda external listener); container overrides via SPRING_KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: localhost:19092
    consumer:
      # Own group, earliest — drains the AlertRaised backlog on first start (Phase 3E).
      group-id: case-service

# Axon Framework (Phase 3B/3C): event store + token store on the JPA/Postgres tables above (decision
# G — no Axon Server container). Disabling the Axon Server connector makes Axon fall back to the
# embedded JPA event store and JPA token store.
axon:
  axonserver:
    enabled: false
  serializer:
    # Use Jackson everywhere instead of Axon's default XStream: our events/commands are Java records,
    # and XStream cannot reflectively (de)serialize records on JDK 17+ ("can't get field offset on a
    # record class"). Jackson maps records natively (we compile with -parameters). Payloads are stored
    # as JSON bytes in the event store's oid columns.
    general: jackson
    events: jackson
    messages: jackson

# Flowable BPMN engine (Phase 3D): the embedded process engine in the workflow module, on the same
# datasource. House rule — Flyway owns every table (V3), so Flowable never touches the schema.
flowable:
  # Do NOT auto-create/upgrade: validate-only against the tables Flyway created (versions must match).
  database-schema-update: false
  # Flowable's tables live in this service's own schema, like the Axon + CaseView tables.
  database-schema: casework
  # The investigation lifecycle is synchronous (service tasks run inline); no background job pollers.
  async-executor-activate: false
  # Process engine only — disable the IDM and event-registry sub-engines so their tables aren't needed.
  idm:
    enabled: false
  eventregistry:
    enabled: false

# Dolos policy (Phase 3E): only HIGH alerts (score at/above this) auto-open an investigation case;
# alert-service raises alerts from score 60, so 80 keeps routine alerts on the queue and reserves a
# case for the severe ones (ring alerts, stacked typologies).
dolos:
  case:
    high-score-threshold: 80

server:
  port: 8086

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "3D"
