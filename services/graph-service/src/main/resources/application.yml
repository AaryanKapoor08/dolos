spring:
  application:
    name: graph-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config from config-server. `optional:`
    # so the service still boots from this local application.yml if the config server is unreachable;
    # the container overrides the host to config-server:8888 (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  threads:
    virtual:
      # Java 21 virtual threads for request handling + the blocking Kafka/Bolt consumer path.
      enabled: true
  neo4j:
    # Host default (Neo4j Bolt); the container overrides via SPRING_NEO4J_* (see services.yml).
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: dolosgraph
  kafka:
    # Host default (Redpanda external listener); container overrides via SPRING_KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: localhost:19092
    consumer:
      # Own group, earliest: graph-service drains the topic backlog the first time it runs so the
      # graph reflects transactions received before this service existed.
      group-id: graph-service

# Ring detection policy (Phase 2E): find directed TRANSACTED chains of this many hops that return
# to the origin account (A->B->C->...->A) — a classic layered cash-out / mule ring.
dolos:
  graph:
    ring:
      min-length: 2
      max-length: 6
      # A detected ring publishes RingDetected with this score so alert-service can escalate.
      score: 85

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        # health + info, plus refresh so a centralized config change is picked up via POST /actuator/refresh (5A).
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "2D"

# Register with the Eureka service registry (Phase 5A). Host default points at localhost; on the Docker
# network the container overrides EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to discovery-server:8761.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Advertise by IP — the default OS hostname (container id) isn't resolvable by Eureka peers.
    prefer-ip-address: true
