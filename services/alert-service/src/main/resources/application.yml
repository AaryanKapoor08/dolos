spring:
  application:
    name: alert-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config from config-server. `optional:`
    # so the service still boots from this local application.yml if the config server is unreachable;
    # the container overrides the host to config-server:8888 (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  threads:
    virtual:
      # Java 21 virtual threads for request handling + the blocking Kafka consumer path.
      enabled: true
  datasource:
    # Host default; the container overrides via SPRING_DATASOURCE_* (see services.yml).
    url: jdbc:postgresql://localhost:5432/dolos
    username: dolos
    password: dolos
  jpa:
    # Flyway owns the schema; Hibernate neither creates nor mutates it.
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        # Qualify entity tables with this service's own schema (matches Flyway below).
        default_schema: alert
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    # Own schema so services can share the `dolos` database without colliding: Flyway creates and
    # migrates the `alert` schema (its history table lives there too), isolated from `public`.
    schemas: alert
    default-schema: alert
    locations: classpath:db/migration
  kafka:
    # Host default (Redpanda external listener); container overrides via SPRING_KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: localhost:19092
    consumer:
      # Consumer group for the alert path (Phase 1E); own group, earliest, drains the backlog.
      group-id: alert-service
  security:
    oauth2:
      resourceserver:
        jwt:
          # Phase 5B: validate bearer JWTs against the Keycloak `dolos` realm's signing keys, so this
          # service independently rejects an invalid token (defence in depth behind the gateway). Host
          # default; the container overrides via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI.
          jwk-set-uri: http://localhost:8087/realms/dolos/protocol/openid-connect/certs

# Alert policy: a RiskScored at/above this score raises an alert. Configurable; v0 LARGE_AMOUNT = 60.
dolos:
  alert:
    score-threshold: 60
  scoring:
    grpc:
      # Host default; the container overrides to scoring-service:9090 (see services.yml).
      target: localhost:9090
      # Per-call gRPC deadline — the "timeout" leg of the resilience wrap.
      deadline-ms: 500

# Resilience4j around the synchronous scoring gRPC call (Phase 2C): retry transient failures, and
# trip a circuit breaker so a scoring outage falls back fast to "details unavailable".
resilience4j:
  circuitbreaker:
    instances:
      scoring:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      scoring:
        max-attempts: 3
        wait-duration: 200ms

server:
  port: 8084

management:
  endpoints:
    web:
      exposure:
        # health + info, plus refresh so a centralized config change is picked up via POST /actuator/refresh (5A).
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "2C"

# Register with the Eureka service registry (Phase 5A). Host default points at localhost; on the Docker
# network the container overrides EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to discovery-server:8761.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Advertise by IP — the default OS hostname (container id) isn't resolvable by Eureka peers.
    prefer-ip-address: true
