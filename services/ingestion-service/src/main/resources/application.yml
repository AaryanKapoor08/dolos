spring:
  application:
    name: ingestion-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config from config-server. `optional:`
    # so the service still boots from this local application.yml if the config server is unreachable;
    # the container overrides the host to config-server:8888 (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  r2dbc:
    # App data path is reactive. Host default; container overrides via SPRING_R2DBC_* (services.yml).
    # `schema=ingestion` sets the connection search_path so unqualified table names resolve to
    # this service's own schema (see spring.flyway.schemas below).
    url: r2dbc:postgresql://localhost:5432/dolos?schema=ingestion
    username: dolos
    password: dolos
  flyway:
    enabled: true
    # Flyway migrates over JDBC (its own short-lived connection); the app itself uses R2DBC only.
    url: jdbc:postgresql://localhost:5432/dolos
    user: dolos
    password: dolos
    # Own schema so services can share the `dolos` database without colliding: Flyway creates and
    # migrates the `ingestion` schema (its history table lives there too), isolated from `public`.
    schemas: ingestion
    default-schema: ingestion
    locations: classpath:db/migration
  kafka:
    # Host default (Redpanda external listener); container overrides via SPRING_KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: localhost:19092
  security:
    oauth2:
      resourceserver:
        jwt:
          # Phase 5B: validate bearer JWTs against the Keycloak `dolos` realm's signing keys. Presence of
          # this property also activates IngestionSecurityConfig (which keeps /ingest open for NiFi). Host
          # default; the container overrides via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI.
          jwk-set-uri: http://localhost:8087/realms/dolos/protocol/openid-connect/certs

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        # health + info, plus refresh so a centralized config change is picked up via POST /actuator/refresh (5A).
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "1B"

# Register with the Eureka service registry (Phase 5A). Host default points at localhost; on the Docker
# network the container overrides EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to discovery-server:8761.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Advertise by IP — the default OS hostname (container id) isn't resolvable by Eureka peers.
    prefer-ip-address: true
