spring:
  application:
    name: reporting-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config; `optional:` so the service still
    # boots from this local file if config-server is down. Container overrides the host (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  threads:
    virtual:
      enabled: true
  datasource:
    # Host default; the container overrides via SPRING_DATASOURCE_* (see services.yml).
    url: jdbc:postgresql://localhost:5432/dolos
    username: dolos
    password: dolos
  flyway:
    enabled: true
    # Own schema so services share the `dolos` database without colliding. Flyway creates + migrates
    # `reporting` (its history table lives there too) — and it is the single owner of the Batch metadata
    # tables, so Batch's own initializer is disabled (below).
    schemas: reporting
    default-schema: reporting
    locations: classpath:db/migration
  batch:
    jdbc:
      # Flyway owns the schema (V1 creates the BATCH_* tables in `reporting`); never let Batch create them.
      initialize-schema: never
      # Resolve the Batch DAOs to the reporting schema's prefixed tables.
      table-prefix: reporting.BATCH_
    job:
      # Do NOT run the job at startup — it is driven by the nightly scheduler and the REST trigger.
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Phase 5B: validate bearer JWTs against the Keycloak `dolos` realm. Host default; container
          # overrides via SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI.
          jwk-set-uri: http://localhost:8087/realms/dolos/protocol/openid-connect/certs

server:
  port: 8093

# Reporting-service knobs (Phase 6B).
dolos:
  reporting:
    # Nightly filing run (default 02:00). The scheduler files the day that just ended.
    cron: "0 0 2 * * *"
    minio:
      # Host defaults; the container overrides via DOLOS_REPORTING_MINIO_* (see services.yml).
      endpoint: http://localhost:9000
      access-key: dolos
      secret-key: dolosminio
      # Bucket holding the FORMALLY FILED reports (distinct from the copilot's `sar-drafts`).
      bucket: filed-reports

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always

info:
  app:
    name: ${spring.application.name}
    phase: "6B"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
