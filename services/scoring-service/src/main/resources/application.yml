spring:
  application:
    name: scoring-service
  config:
    # Spring Cloud Config client (Phase 5A): pull centralized config from config-server. `optional:`
    # so the service still boots from this local application.yml if the config server is unreachable;
    # the container overrides the host to config-server:8888 (see services.yml).
    import: "optional:configserver:http://localhost:8888"
  threads:
    virtual:
      enabled: true
  kafka:
    # Host default (Redpanda external listener); container overrides via SPRING_KAFKA_BOOTSTRAP_SERVERS.
    bootstrap-servers: localhost:19092
    streams:
      # Identifies the Streams app: names its consumer group, internal topics, and state-store dir.
      application-id: scoring-service
      # In-memory stores still need a state dir for metadata; keep it on a writable path.
      state-dir: ${java.io.tmpdir}/kafka-streams/scoring
      properties:
        # Operators set serdes explicitly; these defaults only cover any internal plumbing.
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        # Commit/flush promptly so scores appear without waiting the 30s default — snappier demo/test.
        commit.interval.ms: 200

server:
  port: 8083

# gRPC ScoringService (Phase 2C) — separate port from the HTTP/Actuator 8083.
dolos:
  grpc:
    port: 9090

management:
  endpoints:
    web:
      exposure:
        # health + info, plus refresh so a centralized config change is picked up via POST /actuator/refresh (5A).
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    phase: "2C"

# Register with the Eureka service registry (Phase 5A). Host default points at localhost; on the Docker
# network the container overrides EUREKA_CLIENT_SERVICEURL_DEFAULTZONE to discovery-server:8761.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    # Advertise by IP — the default OS hostname (container id) isn't resolvable by Eureka peers.
    prefer-ip-address: true
